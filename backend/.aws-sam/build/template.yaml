AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: "StudX Backend \u2013 FastAPI"
Resources:
  StudentMasterTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: StudX_StudentMaster
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: pk
        AttributeType: S
      - AttributeName: sk
        AttributeType: S
      KeySchema:
      - AttributeName: pk
        KeyType: HASH
      - AttributeName: sk
        KeyType: RANGE
      Tags:
      - Key: Environment
        Value: Production
      - Key: Application
        Value: StudX
  StudXFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: StudXFunction
      Handler: app.handler
      Runtime: python3.11
      Architectures:
      - x86_64
      MemorySize: 256
      Timeout: 30
      Environment:
        Variables:
          STUDENT_TABLE: StudX_StudentMaster
          SEATING_TABLE: StudX_SeatingAllocations
          AWS_REGION_NAME:
            Ref: AWS::Region
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: StudentMasterTable
      - DynamoDBCrudPolicy:
          TableName: StudX_SeatingAllocations
      Events:
        RootPath:
          Type: Api
          Properties:
            Path: /
            Method: ANY
        ProxyPath:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: ANY
    Metadata:
      SamResourceId: StudXFunction
Outputs:
  ApiUrl:
    Description: API Gateway endpoint
    Value:
      Fn::Sub: https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/
  StudentTableName:
    Description: DynamoDB table name for student master data
    Value:
      Ref: StudentMasterTable
  StudentTableArn:
    Description: DynamoDB table ARN for student master data
    Value:
      Fn::GetAtt:
      - StudentMasterTable
      - Arn
  SeatingTableName:
    Description: DynamoDB table name for seating allocations
    Value: StudX_SeatingAllocations
